<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarCraker - Bestiário de Monstros</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="monstros.css">
</head>
<body>

    <div class="navbar">
        <div class="logo">DarCraker</div>
        <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <a href="../../inicio/inicio.html" id="btn-home" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../img/icones/inicio.jpg" id="img-home" alt="Início" class="sidebar-img">
                <span>Início</span>
            </a>
            
            <a href="../../heroi/status/status.html" id="btn-heroi" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../img/icones/heroi.jpg" id="img-heroi" alt="Herói" class="sidebar-img">
                <span>Herói</span>
            </a>
            
            <a href="../../mundo/mundo.html" id="btn-mundo" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../img/icones/mundo.jpg" id="img-mundo" alt="Mundo" class="sidebar-img">
                <span>Mundo</span>
            </a>
            
            <a href="../bestiario.html" id="btn-bestiario-poring" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../img/icones/bestiario.jpg" id="img-bestiario" alt="Bestiário" class="sidebar-img">
                <span>Bestiário</span>
            </a>

            <a href="../../index.html" id="btn-sair" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../img/icones/sair.jpg" id="img-sair" alt="Sair" class="sidebar-img">
                <span>Sair</span>
            </a>
            
            <hr class="sidebar-divider">
            
            <a href="#" onclick="salvarNoSlotAtual(); return false;" class="sidebar-link btn-nav-save">
                <span>💾 Salvar no Slot</span>
            </a>
            
            <a href="#" onclick="exportarSaveFisico(); return false;" class="sidebar-link btn-nav-export">
                <span>📤 Exportar Backup</span>
            </a>
        </div>
    </nav>

    <div class="game-container">
        <div class="bestiario-header">
            <h2>Bestiário dos Monstros</h2>

            <div class="monstros-container">
                <img src="../../img/icones/monstros.jpg" alt="Ícone monstros" class="monstros-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div class="monstros-icon" style="display: none;">🐉</div>
            </div>

            <p>Encontre aqui todos os monstros do mundo de DarCraker, suas informações, fraquezas e drops.</p>
        </div>

        <div class="monstros-grid">
            
            <!-- CARD DO PORING CORRIGIDO: O card inteiro agora é o link -->
            <a href="poring/poring.html" class="monster-card">
                <div class="monster-img-container">
                    <img src="../../img/monstros/poring.jpg" alt="Poring" class="monster-card-img">
                    <span class="monster-badge">Nível - 1</span>
                </div>
                <div class="monster-card-info">
                    <h3>Poring</h3>
                </div>
            </a>

            <!-- O card bloqueado continua como DIV porque não deve redirecionar a lugar nenhum -->
            <div class="monster-card locked">
                <div class="monster-img-container">
                    <div class="monster-img-placeholder">❓</div>
                    <span class="monster-badge locked-badge">Em Breve</span>
                </div>
                <div class="monster-card-info">
                    <h3>Monstro Misterioso</h3>
                </div>
            </div>

        </div>
    </div>

    <script src="monstros.js"></script>
</body>
</html>
