<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarCraker - Mundo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="mundo.css">
</head>
<body>

    <div class="navbar">
        <div class="logo">DarCraker</div>
        <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <a href="../inicio/inicio.html" id="btn-home" class="sidebar-link">
                <img src="../img/icones/inicio.jpg" id="img-home" alt="Início" class="sidebar-img">
                <span>Início</span>
            </a>
            
            <a href="../heroi/heroi.html" id="btn-heroi" class="sidebar-link">
                <img src="../img/icones/heroi.jpg" id="img-heroi" alt="heroi" class="sidebar-img">
                <span>Herói</span>
            </a>
            
            <a href="../bestiario/bestiario.html" id="btn-bestiario-poring" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../img/icones/bestiario.jpg" id="img-bestiario" alt="Bestiário" class="sidebar-img">
                <span>Bestiário</span>
            </a>

            <a href="../index.html" id="btn-sair" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../img/icones/sair.jpg" id="img-sair" alt="Sair" class="sidebar-img">
                <span>Sair</span>
            </a>
            
            <hr class="sidebar-divider">
            
            <a href="#" onclick="salvarNoSlotAtual(); return false;" class="sidebar-link btn-nav-save">
                <span>💾 Salvar no Slot</span>
            </a>
            
            <a href="#" onclick="exportarSaveFisico(); return false;" class="sidebar-link btn-nav-export">
                <span>📤 Exportar Backup</span>
            </a>
        </div>
    </nav>

    <div class="game-container">
        <div class="mundo-header">
            <h2>Menu do Mundo</h2>

            <!-- Imagem Temática do mundo adicionada aqui -->
            <div class="mundo-container">
                <img src="../img/icones/mundo.jpg" alt="Ícone mundo" class="mundo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div class="mundo-icon" style="display: none;">🐉</div>
            </div>


            <p>Explore as vastas terras de DarCraker. Viaje entre cidades, enfrente perigos em masmorras sombrias, negocie nos mercados locais ou descanse na taverna.</p>
        </div>

        <div class="mundo-grid">
            
            <a href="cidade/cidade.html" class="mundo-card" id="card-cidade" style="text-decoration: none;">
                <div class="mundo-img-container">
                    <img src="../img/icones/cidade.jpg" alt="Cidade" class="mundo-card-img">
                </div>
                <div class="mundo-card-info">
                    <h3>Cidade</h3>
                </div>
            </a>

            <a href="regioes/regioes.html" class="mundo-card" id="card-regioes" style="text-decoration: none;">
                <div class="mundo-img-container">
                    <img src="../img/icones/regioes.jpg" alt="Regiões" class="mundo-card-img">
                </div>
                <div class="mundo-card-info">
                    <h3>Regiões</h3>
                </div>
            </a>

            <a href="#" class="mundo-card" id="card-dungeons" style="text-decoration: none;">
                <div class="mundo-img-container">
                    <img src="../img/icones/dungeons.jpg" alt="Masmorras" class="mundo-card-img">
                </div>
                <div class="mundo-card-info">
                    <h3>Dungeons</h3>
                </div>
            </a>

            <a href="#" class="mundo-card" id="card-chefes_globais" style="text-decoration: none;">
                <div class="mundo-img-container">
                    <img src="../img/icones/chefes_globais.jpg" alt="Chefes Globais" class="mundo-card-img">
                </div>
                <div class="mundo-card-info">
                    <h3>Chefes Globais</h3>
                </div>
            </a>

            

        </div>
    </div>

    <script src="mundo.js"></script>
</body>
</html>
