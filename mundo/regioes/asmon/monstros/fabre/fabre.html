<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarCraker - Combate: Fabre</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.0.0.2"> 
</head>
<body>

    <div class="navbar">
        <div class="logo">DarCraker</div>
        <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <a href="../../../../../inicio/inicio.html" id="btn-home" class="sidebar-link">
                <img src="../../../../../img/icones/inicio.jpg" id="img-home" alt="Início" class="sidebar-img">
                <span>Início</span>
            </a>
            
            <a href="../../../../../heroi/heroi.html" id="btn-heroi" class="sidebar-link">
                <img src="../../../../../img/icones/heroi.jpg" id="img-heroi" alt="heroi" class="sidebar-img">
                <span>Herói</span>
            </a>

            <a href="../../../../../mundo/mundo.html" id="btn-mundo" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../../../../img/icones/mundo.jpg" id="img-mundo" alt="mundo" class="sidebar-img">
                <span>Mundo</span>
            </a>
            
            <a href="../../../../../bestiario/bestiario.html" id="btn-bestiario-fabre" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../../../../img/icones/bestiario.jpg" id="img-bestiario" alt="Bestiário" class="sidebar-img">
                <span>Bestiário</span>
            </a>

            <a href="../../../../../index.html" id="btn-sair" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../../../../img/icones/sair.jpg" id="img-sair" alt="Sair" class="sidebar-img">
                <span>Sair</span>
            </a>
            
            <hr class="sidebar-divider">
            
            <a href="#" onclick="salvarNoSlotAtual(); return false;" class="sidebar-link btn-nav-save">
                <span>💾 Salvar no Slot</span>
            </a>
            
            <a href="#" onclick="exportarSaveFisico(); return false;" class="sidebar-link btn-nav-export">
                <span>📤 Exportar Backup</span>
            </a>
        </div>
    </nav>

    <div class="battle-container">
        <div class="battle-box">
            <h3 id="hero-nome" style="color: #00ffff;">Herói</h3>
            <p>Nível <span id="hero-nivel">1</span></p>

            <!-- Imagem do Herói adicionada aqui -->
            <img src="../../../../../img/icones/heroi.jpg" id="hero-imagem" alt="Herói" class="battle-img">
          
            <div class="hp-bar">
                <div id="hero-hp-bar" class="hp-fill"></div>
            </div>
            <p style="margin-top: 5px;">HP: <span id="hero-hp-texto">20/20</span></p>
        </div>

        <div style="font-size: 2rem; color: #ff0055; font-weight: bold;">VS</div>

        <div class="battle-box monster-box">
            <h3 id="monster-nome" style="color: #ff0055;">Fabre</h3>
            <p>Nível <span id="monster-nivel">1</span></p>
            
            
            <!-- Imagem do Monstro adicionada aqui -->
            <img src="../../../../../img/monstros/fabre.jpg" id="monster-imagem" alt="Fabre" class="battle-img monster-img-border">


            <div class="hp-bar">
                <div id="monster-hp-bar" class="hp-fill monster-hp"></div>
            </div>
            <p style="margin-top: 5px;">HP: <span id="monster-hp-texto">5/5</span></p>
        </div>
    </div>

    <div class="log-box" id="combat-log">
        <p style="color: #eab308;">[SISTEMA]: Um Fabre selvagem apareceu! Prepare-se para lutar.</p>
    </div>

    <div class="treino-container">
        <span class="treino-titulo">Foco de Treino:</span>
        <div class="treino-botoes">
            <button id="btn-foco-ataque" class="btn-foco ativo" onclick="selecionarFoco('ataque')">⚔️ Ataque</button>
            <button id="btn-foco-defesa" class="btn-foco" onclick="selecionarFoco('defesa')">🛡️ Defesa</button>
        </div>
    </div>

    <div class="action-panel">
        <button id="btn-atacar" class="btn-menu btn-start" onclick="alternarCombate()">⚔️ ATACAR</button>
        <button id="btn-mochila" class="btn-menu" onclick="alternarMochilaCombate()" style="border-color: #000000; color: #000000; padding: 10px 30px; font-size: 1rem;">🎒 MOCHILA</button>
    </div>

    <div id="painel-mochila-combate" style="display: none; background: rgba(13, 13, 13, 0.95); border: 2px solid #000000; max-width: 400px; margin: 15px auto; padding: 15px; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);">
        <h4 style="color: #ffffff; margin-bottom: 10px; text-transform: uppercase;">Consumíveis disponíveis</h4>
        <div id="lista-consumiveis-combate" style="display: flex; flex-direction: column; gap: 8px; max-height: 120px; overflow-y: auto; padding-right: 5px;">
            </div>
    </div>

    <div class="timer-container">
        <span id="timer-texto" style="color: #aaa; font-size: 0.9rem; font-family: monospace;">Pronto para combater</span>
        <div class="timer-bar">
            <div id="action-timer-bar" class="timer-fill"></div>
        </div>
    </div>

    <script src="../../../../../heroi/status/nivel_ataque.js"></script>
    <script src="../../../../../heroi/status/nivel_defesa.js"></script>
    <script src="fabre.js?v=1.0.0.2"></script>
</body>
</html>
