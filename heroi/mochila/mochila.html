<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarCraker - Mochila</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="mochila.css">
</head>
<body>

    <div class="navbar">
        <div class="logo">DarCraker</div>
        <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <a href="../../inicio/inicio.html" id="btn-home" class="sidebar-link">
                <img src="../../img/icones/inicio.jpg" id="img-home" alt="Início" class="sidebar-img">
                <span>Início</span>
            </a>
            
            <a href="../../heroi/heroi.html" id="btn-heroi" class="sidebar-link">
                <img src="../../img/icones/heroi.jpg" id="img-heroi" alt="heroi" class="sidebar-img">
                <span>Herói</span>
            </a>

            
            
            <a href="../../mundo/mundo.html" id="btn-mundo" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../img/icones/mundo.jpg" id="img-mundo" alt="mundo" class="sidebar-img">
                <span>Mundo</span>
            </a>
            
            <a href="../../bestiario/bestiario.html" id="btn-bestiario-poring" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../img/icones/bestiario.jpg" id="img-bestiario" alt="Bestiário" class="sidebar-img">
                <span>Bestiário</span>
            </a>

            <a href="../../index.html" id="btn-sair" class="sidebar-link" style="border-left: 2px solid #ff0055;">
                <img src="../../img/icones/sair.jpg" id="img-sair" alt="Sair" class="sidebar-img">
                <span>Sair</span>
            </a>
            
            <hr class="sidebar-divider">
            
            <a href="#" onclick="salvarNoSlotAtual(); return false;" class="sidebar-link btn-nav-save">
                <span>💾 Salvar no Slot</span>
            </a>
            
            <a href="#" onclick="exportarSaveFisico(); return false;" class="sidebar-link btn-nav-export">
                <span>📤 Exportar Backup</span>
            </a>
        </div>
    </nav>

    <div class="inventory-container">
        <div class="inventory-header">
            <h2>Inventário de Itens</h2>
            <p>Gerencie seus espólios e materiais coletados.</p>
        </div>

        <div class="inventory-grid" id="mochila-grid"></div>
    </div>

    <div class="modal" id="item-modal" onclick="fecharModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="fecharModal()">&times;</span>
            <div class="modal-icon" id="modal-item-icone">💎</div>
            <h3 id="modal-item-nome">Nome do Item</h3>
            <span class="item-tag" id="modal-item-tipo">Comum</span>
            <p class="modal-desc" id="modal-item-descricao">Descrição do item.</p>
            <div class="modal-footer">
                <span>Quantidade: <strong id="modal-item-qtd">0</strong></span>

                <span>Valor: <strong id="modal-item-valor">0</strong> Moedas de ouro</span>
            </div>
        </div>
    </div>

    <script src="../../mundo/cidade/comprador/valor_comprador.js"></script>
    <script src="mochila.js"></script>
</body>
</html>
